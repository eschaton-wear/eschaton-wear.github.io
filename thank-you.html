<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ESCHATON — заказ отправлен</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thankyou {
      text-align: center;
      padding: 32px 24px;
      border: 1px solid #333333;
      border-radius: 4px;
      background: #0a0a0a;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
      max-width: 360px;
    }
    .thankyou-title {
      font-size: 20px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .thankyou-text {
      font-size: 14px;
      color: #aaaaaa;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .thankyou-btn {
      display: inline-block;
      padding: 12px 26px;
      background: #ffffff;
      color: #000000;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-decoration: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .thankyou-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="thankyou">
    <div class="thankyou-title">Заказ отправлен</div>
    <p class="thankyou-text">
      Мы получили ваш заказ и скоро свяжемся с вами для подтверждения.
    </p>
    <a href="https://eschaton-wear.github.io/" class="thankyou-btn">
      Вернуться в магазин
    </a>
  </div>

  <script>
    // очищаем корзину в браузере
    localStorage.removeItem('eschaton_cart');
  </script>
</body>
</html>
